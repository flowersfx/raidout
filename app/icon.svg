<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>

  <!-- EQ spectrum bars — heights reflect the foh-bar animation character -->
  <!-- bar 1: short -->
  <rect x="3"  y="21" width="4" height="9"  rx="1" fill="#00e5ff" opacity="0.55"/>
  <!-- bar 2: tall -->
  <rect x="9"  y="8"  width="4" height="22" rx="1" fill="#00e5ff"/>
  <!-- bar 3: mid -->
  <rect x="15" y="14" width="4" height="16" rx="1" fill="#00e5ff" opacity="0.85"/>
  <!-- bar 4: tallest -->
  <rect x="21" y="4"  width="4" height="26" rx="1" fill="#00e5ff"/>
  <!-- bar 5: short-mid -->
  <rect x="27" y="18" width="2" height="12" rx="1" fill="#00e5ff" opacity="0.55"/>
</svg>
